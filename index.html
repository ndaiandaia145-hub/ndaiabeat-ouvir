<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ndaiabeat Player</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* Player */
.player {
    width: 350px;
    background: #121212;
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.6);
    text-align: center;
}

/* Capa */
.cover {
    width: 100%;
    height: 200px;
    background: linear-gradient(45deg, #ffb400, #ff6600);
    border-radius: 15px;
    margin-bottom: 20px;
}

/* Texto */
h2 {
    font-size: 1.3rem;
    margin-bottom: 10px;
}

p {
    font-size: 0.9rem;
    opacity: 0.7;
    margin-bottom: 20px;
}

/* Botão */
button {
    background: #ffb400;
    border: none;
    padding: 15px 20px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    margin-bottom: 15px;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
}

/* Barra */
.progress-container {
    width: 100%;
    height: 6px;
    background: #333;
    border-radius: 5px;
    cursor: pointer;
}

.progress {
    height: 100%;
    width: 0%;
    background: #ffb400;
    border-radius: 5px;
}

/* Tempo */
.time {
    display: flex;
    justify-content: space-between;
    font-size: 0.8rem;
    margin-top: 5px;
    opacity: 0.7;
}
</style>
</head>

<body>

<div class="player">
    
    <div class="cover"></div>

    <h2>Ndaiabeat</h2>
    <p>Embarque numa viagem sonora e descubra a verdadeira africanidade</p>

    <button id="playBtn">▶</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress" id="progress"></div>
    </div>

    <div class="time">
        <span id="currentTime">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <!-- 🔥 ÁUDIO LOCAL (ESSENCIAL) -->
    <audio id="audio" preload="auto">
        <source src="2026-2026-2.mp3" type="audio/mpeg">
    </audio>

</div>

<script>
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');
const progress = document.getElementById('progress');
const progressContainer = document.getElementById('progressContainer');
const currentTimeEl = document.getElementById('currentTime');
const durationEl = document.getElementById('duration');

// Carregar áudio
audio.load();

// Play / Pause
playBtn.addEventListener('click', async () => {
    try {
        if (audio.paused) {
            await audio.play();
            playBtn.textContent = '⏸';
        } else {
            audio.pause();
            playBtn.textContent = '▶';
        }
    } catch (error) {
        alert("Clique novamente para ativar o áudio");
    }
});

// Atualizar barra
audio.addEventListener('timeupdate', () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = percent + "%";

    let min = Math.floor(audio.currentTime / 60);
    let sec = Math.floor(audio.currentTime % 60);
    if (sec < 10) sec = "0" + sec;
    currentTimeEl.textContent = min + ":" + sec;
});

// Duração total
audio.addEventListener('loadedmetadata', () => {
    let min = Math.floor(audio.duration / 60);
    let sec = Math.floor(audio.duration % 60);
    if (sec < 10) sec = "0" + sec;
    durationEl.textContent = min + ":" + sec;
});

// Clique na barra
progressContainer.addEventListener('click', (e) => {
    const width = progressContainer.clientWidth;
    const clickX = e.offsetX;
    audio.currentTime = (clickX / width) * audio.duration;
});
</script>

</body>
</html>
