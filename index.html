<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ndaiabeat Player</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.player {
    width: 320px;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
}
button {
    padding: 15px;
    font-size: 18px;
    background: #ffb400;
    border: none;
    border-radius: 50%;
    cursor: pointer;
}
audio {
    display: none; /* esconde o player nativo */
}
</style>
</head>

<body>

<div class="player">
    <h2>Ndaiabeat</h2>
    <button id="playBtn">▶</button>

    <audio id="audio">
        <source src="2026-2026-2.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>
</div>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");

btn.addEventListener("click", function () {
    if (audio.paused) {
        audio.play().then(() => {
            btn.textContent = "⏸";
        }).catch(err => {
            console.log("Erro ao tentar reproduzir:", err);
            alert("Clique diretamente no player se o áudio não tocar.");
        });
    } else {
        audio.pause();
        btn.textContent = "▶";
    }
});
</script>

</body>
</html>
