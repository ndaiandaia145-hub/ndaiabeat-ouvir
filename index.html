<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ndaiabeat Player</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #111;
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.player {
    width: 320px;
    background: #1c1c1c;
    padding: 20px;
    border-radius: 15px;
    text-align: center;
    box-shadow: 0 0 20px rgba(255,180,0,0.5);
}
button {
    padding: 15px;
    font-size: 18px;
    background: #ffb400;
    border: none;
    border-radius: 50%;
    cursor: pointer;
    transition: transform 0.2s;
}
button:hover {
    transform: scale(1.1);
}
.progress-container {
    width: 100%;
    background: #333;
    height: 8px;
    border-radius: 4px;
    margin-top: 20px;
    cursor: pointer;
}
.progress {
    background: #ffb400;
    height: 100%;
    width: 0%;
    border-radius: 4px;
}
.time {
    display: flex;
    justify-content: space-between;
    font-size: 12px;
    margin-top: 5px;
}
audio {
    display: none; /* player nativo escondido */
}
</style>
</head>

<body>

<div class="player">
    <h2>Ndaiabeat</h2>
    <button id="playBtn">▶</button>

    <div class="progress-container" id="progressContainer">
        <div class="progress" id="progress"></div>
    </div>
    <div class="time">
        <span id="current">0:00</span>
        <span id="duration">0:00</span>
    </div>

    <audio id="audio">
        <source src="2026-2026-2.mp3" type="audio/mpeg">
        Seu navegador não suporta áudio.
    </audio>
</div>

<script>
const audio = document.getElementById("audio");
const btn = document.getElementById("playBtn");
const progress = document.getElementById("progress");
const progressContainer = document.getElementById("progressContainer");
const currentTimeEl = document.getElementById("current");
const durationEl = document.getElementById("duration");

// Play / Pause
btn.addEventListener("click", () => {
    if (audio.paused) {
        audio.play();
        btn.textContent = "⏸";
    } else {
        audio.pause();
        btn.textContent = "▶";
    }
});

// Atualiza progresso e tempo
audio.addEventListener("timeupdate", () => {
    const percent = (audio.currentTime / audio.duration) * 100;
    progress.style.width = `${percent}%`;

    let curMin = Math.floor(audio.currentTime / 60);
    let curSec = Math.floor(audio.currentTime % 60);
    if (curSec < 10) curSec = "0" + curSec;
    currentTimeEl.textContent = `${curMin}:${curSec}`;

    let durMin = Math.floor(audio.duration / 60) || 0;
    let durSec = Math.floor(audio.duration % 60) || 0;
    if (durSec < 10) durSec = "0" + durSec;
    durationEl.textContent = `${durMin}:${durSec}`;
});

// Clicar na barra de progresso
progressContainer.addEventListener("click", (e) => {
    const width = progressContainer.clientWidth;
    const clickX = e.offsetX;
    const duration = audio.duration;
    audio.currentTime = (clickX / width) * duration;
});
</script>

</body>
</html>
